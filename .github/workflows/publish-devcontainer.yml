name: Upload Dev Container Image

on:
  push:
    branches:
      - main
    paths:
      - '.devcontainer/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Set up QEMU for ARM emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Pre-build and push multi-architecture image
      - name: Pre-build and push Dev Container image
        uses: devcontainers/ci@v0.3
        env:
          # Avoids a common multi-platform image manifest issue with Skopeo copy failures
          BUILDX_NO_DEFAULT_ATTESTATIONS: true 
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          imageTag: latest
          platform: linux/amd64,linux/arm64
          push: always
